# Dependabot configuration for gigHood
# Uses grouped updates to produce ONE PR per ecosystem instead of one per package.

version: 2
updates:

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "github-actions"

  # Python — backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      backend-deps:
        patterns: ["*"]
    ignore:
      # pytest 9.x is incompatible with all versions of pytest-asyncio
      - dependency-name: "pytest"
        versions: [">=9"]
      # pyiceberg 0.11 requires rich < 15.0.0
      - dependency-name: "rich"
        versions: [">=15"]
    labels:
      - "dependencies"
      - "python"

  # Node.js — frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      frontend-deps:
        patterns: ["*"]
    ignore:
      # ESLint 10 is a major breaking release
      - dependency-name: "eslint"
        versions: [">=10"]
      # TypeScript 6 is a major breaking release
      - dependency-name: "typescript"
        versions: [">=6"]
    labels:
      - "dependencies"
      - "javascript"

  # Docker — base image in Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      docker-base:
        patterns: ["*"]
    ignore:
      # Pinned to Python 3.11 for compatibility
      - dependency-name: "python"
        versions: [">=3.12"]
    labels:
      - "dependencies"
      - "docker"

  # Docker — frontend Dockerfile
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      docker-frontend:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "docker"
